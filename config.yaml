---
name: owserver (1-wire)
version: 0.6.0
slug: owserver
description: onewire server to read 1-Wire devices+
url: https://github.com/lrybak/hassio-owserver
startup: system
init: false
arch:
  - amd64
  - aarch64
  - armhf
  - armv7
boot: auto
discovery:
  - onewire
uart: true
options:
  devices:
    - device_type: device_type
      device: device
  owhttpd: true
  temperature_scale: Celsius
schema:
  log_level: list(trace|debug|info|notice|warning|error|fatal)?
  devices:
    - device_type: list(serial|passive|i2c|usb|pbm|ha7net|w1|link|enet|etherweather|fake)
      device: device?
      server: match(^((25[0-5]|2[0-4]\d|1\d\d|[1-9]?\d)\.){3}(25[0-5]|2[0-4]\d|1\d\d|[1-9]?\d)(:(6553[0-5]|655[0-2]\d|65[0-4]\d{2}|6[0-4]\d{3}|[1-5]?\d{1,4}))?$)?
  owhttpd: bool
  temperature_scale: list(Celsius|Fahrenheit|Kelvin|Rankine)
  debug: bool?
ingress: true
panel_icon: mdi:alpha-w-box
image: ghcr.io/lrybak/owserver/{arch}
